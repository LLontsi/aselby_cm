# Configuration Nginx système (hôte) pour ASELBY
# À placer dans /etc/nginx/sites-available/aselby
# puis : sudo ln -s /etc/nginx/sites-available/aselby /etc/nginx/sites-enabled/
# puis : sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name ton-domaine.com www.ton-domaine.com;
    client_max_body_size 20M;

    # Fichiers statiques — servis directement par Nginx
    # Chemin = là où Docker monte le volume static_volume
    location /static/ {
        alias /home/aselby/aselby_final/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /home/aselby/aselby_final/backend/media/;
        expires 7d;
    }

    # Tout le reste → Gunicorn dans Docker
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }
}
