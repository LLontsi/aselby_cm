<!DOCTYPE html>
<html lang="fr">
<head>
{% load static %}
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block titre %}ASELBY{% endblock %} — Association des Élites Bangou de Yaoundé</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link rel="stylesheet" href="{% static 'css/aselby-public.css' %}">
<link rel="stylesheet" href="{% static 'css/aselby-dashboard.css' %}">
<link rel="stylesheet" href="{% static 'css/input-fix.css' %}">
<link rel="stylesheet" href="{% static 'css/aselby-admin.css' %}">
{% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
{% block body %}{% endblock %}
<script src="{% static 'js/aselby-public.js' %}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
